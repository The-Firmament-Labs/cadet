name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cadet-workspace
      - run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cadet-workspace
      - run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cadet-workspace
      - run: bun run build

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cadet-workspace
      - run: cargo test --workspace

  spacetime:
    name: Spacetime
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cadet-workspace
      - run: cd spacetimedb && spacetime build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    env:
      SPACETIMEDB_URL: ${{ secrets.SPACETIMEDB_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cadet-workspace
      - name: Run integration tests (skipped if secrets not configured)
        run: |
          cd apps/web
          if [ -n "$SPACETIMEDB_URL" ] || [ -n "$VERCEL_TOKEN" ]; then
            bun run test:integration
          else
            echo "Skipping integration tests — no secrets configured"
          fi

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-cadet-workspace
      - run: bun run docs:check
      - run: bun run docs:build

  ci-status:
    name: CI Status
    if: always()
    needs: [typecheck, test, build, rust, spacetime, docs]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.typecheck.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" || \
                "${{ needs.rust.result }}" == "failure" || \
                "${{ needs.spacetime.result }}" == "failure" || \
                "${{ needs.docs.result }}" == "failure" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
