name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
      - "agent/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install actionlint
        shell: bash
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run actionlint
        shell: bash
        run: ./actionlint -color

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-cadet-workspace

      - name: Run typecheck
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-cadet-workspace

      - name: Run test suite
        run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-cadet-workspace

      - name: Run build
        run: bun run build

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-cadet-workspace

      - name: Run Rust tests
        run: cargo test --workspace

  spacetime:
    name: Spacetime
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-cadet-workspace

      - name: Build SpacetimeDB module
        working-directory: spacetimedb
        run: spacetime build

  ci-status:
    name: CI Status
    if: always()
    needs: [actionlint, typecheck, test, build, rust, spacetime]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        shell: bash
        run: |
          if [[ "${{ needs.actionlint.result }}" == "failure" || \
                "${{ needs.typecheck.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" || \
                "${{ needs.rust.result }}" == "failure" || \
                "${{ needs.spacetime.result }}" == "failure" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
