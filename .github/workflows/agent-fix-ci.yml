name: Agent CI Fixer

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: agent-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  MAX_FIX_ATTEMPTS: "3"

jobs:
  should-fix:
    name: Check eligibility
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: read
      issues: write
    outputs:
      eligible: ${{ steps.check.outputs.eligible }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      attempt: ${{ steps.check.outputs.attempt }}
    steps:
      - name: Check PR eligibility
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
              per_page: 1,
            });

            if (prs.length === 0) {
              core.setOutput('eligible', 'false');
              return;
            }

            const pr = prs[0];
            core.setOutput('pr_number', String(pr.number));

            if (pr.draft) {
              core.setOutput('eligible', 'false');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const attempts = comments.filter((comment) =>
              comment.body?.includes('<!-- agent-ci-fix-attempt -->')
            ).length;

            if (attempts >= Number(process.env.MAX_FIX_ATTEMPTS || '3')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['needs-human-fix'],
              });
              core.setOutput('eligible', 'false');
              return;
            }

            core.setOutput('eligible', 'true');
            core.setOutput('attempt', String(attempts + 1));

  fix-ci:
    name: Fix CI failure
    needs: should-fix
    if: needs.should-fix.outputs.eligible == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      checks: read
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup workspace
        uses: ./.github/actions/setup-cadet-workspace

      - name: Post fix-attempt marker
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ needs.should-fix.outputs.pr_number }}'),
              body: `<!-- agent-ci-fix-attempt -->\n🔧 Auto-fix attempt ${{ needs.should-fix.outputs.attempt }} for failed CI run ${context.payload.workflow_run.id}.`,
            });

      - name: Run Claude to fix CI
        uses: anthropics/claude-code-action@094bd24d575e7b30ac1576024817bf1a97c81262
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.should-fix.outputs.pr_number }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPOSITORY: ${{ github.repository }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          additional_permissions: |
            actions: read
            checks: read
          claude_args: |
            --allowedTools "Bash(*),Read,Write,Edit,Glob,Grep,LS"
          prompt: |
            You are the CI fixer agent for Cadet. CI failed on PR #${{ needs.should-fix.outputs.pr_number }}.

            Read the failed logs with:
            `gh run view $RUN_ID --repo $REPOSITORY --log-failed`

            Your task:
            1. Identify the failing job or jobs.
            2. Make the smallest fix that resolves the failure.
            3. Re-run only the relevant local verification command.
            4. Commit and push the fix to the current branch.

            Relevant commands in this repo:
            - `bun run typecheck`
            - `bun run test`
            - `bun run build`
            - `cargo test --workspace`
            - `cd spacetimedb && spacetime build`

            Never push to main. Only update the current PR branch.
