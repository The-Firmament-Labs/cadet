name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  gate:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: read
    outputs:
      allowed: ${{ steps.gate.outputs.allowed }}
    steps:
      - name: Check event eligibility
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'pull_request_review_comment') {
              const allowed = context.payload.pull_request.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
              core.setOutput('allowed', String(allowed));
              return;
            }

            if (!context.payload.issue.pull_request) {
              core.setOutput('allowed', 'true');
              return;
            }

            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const allowed = pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            core.setOutput('allowed', String(allowed));

  claude:
    needs: gate
    if: needs.gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@094bd24d575e7b30ac1576024817bf1a97c81262
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          additional_permissions: |
            actions: read
          prompt: |
            The triggering comment contains the user request.

            Treat this workflow as ad hoc Cadet repo help:
            - follow-up edits
            - answering review-thread requests
            - targeted repo assistance

            Do not replace formal PR review or CI fixing behavior.
            Never push directly to main.
