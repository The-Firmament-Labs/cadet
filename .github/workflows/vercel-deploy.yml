name: Vercel Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect Vercel configuration
        id: config
        run: |
          if [ -n "${VERCEL_TOKEN}" ] && [ -n "${VERCEL_ORG_ID}" ] && [ -n "${VERCEL_PROJECT_ID}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy when Vercel secrets are not configured
        if: steps.config.outputs.enabled != 'true'
        run: |
          echo "Skipping Vercel deployment."
          echo "Configure VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID to enable CD."

      - name: Set up Bun
        if: steps.config.outputs.enabled == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Node.js
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: steps.config.outputs.enabled == 'true'
        run: npm install --global vercel@latest

      - name: Create GitHub deployment
        if: steps.config.outputs.enabled == 'true'
        id: github_deployment
        run: |
          payload="$(jq -n \
            --arg ref "${GITHUB_SHA}" \
            --arg description "Cadet web control plane deployment via Vercel" \
            '{
              ref: $ref,
              environment: "production",
              description: $description,
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: true
            }')"
          deployment_id="$(gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/deployments" \
            --input - \
            --jq '.id' <<<"${payload}")"
          echo "deployment_id=${deployment_id}" >> "$GITHUB_OUTPUT"

      - name: Mark deployment in progress
        if: steps.github_deployment.outputs.deployment_id != ''
        run: |
          payload="$(jq -n \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{
              state: "in_progress",
              log_url: $log_url,
              description: "Vercel deployment in progress"
            }')"
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.github_deployment.outputs.deployment_id }}/statuses" \
            --input - <<<"${payload}" >/dev/null

      - name: Install dependencies
        if: steps.config.outputs.enabled == 'true'
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        if: steps.config.outputs.enabled == 'true'
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build for Vercel
        if: steps.config.outputs.enabled == 'true'
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy prebuilt to Vercel
        id: vercel_deploy
        if: steps.config.outputs.enabled == 'true'
        continue-on-error: true
        run: |
          set -eo pipefail
          deploy_log="$(mktemp)"
          vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" 2>&1 | tee "${deploy_log}"

          deployment_url="$(grep -Eo 'https://[^ ]+' "${deploy_log}" | tail -n 1 | tr -d '\r')"
          if [ -z "${deployment_url}" ]; then
            echo "Unable to determine Vercel deployment URL from CLI output."
            exit 1
          fi

          echo "deployment_url=${deployment_url}" >> "$GITHUB_OUTPUT"
          echo "Production deployment URL: ${deployment_url}" >> "$GITHUB_STEP_SUMMARY"

      - name: Mark deployment successful
        if: steps.github_deployment.outputs.deployment_id != '' && steps.vercel_deploy.outcome == 'success'
        run: |
          payload="$(jq -n \
            --arg environment_url "${{ steps.vercel_deploy.outputs.deployment_url }}" \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{
              state: "success",
              environment_url: $environment_url,
              log_url: $log_url,
              description: "Vercel deployment finished successfully"
            }')"
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.github_deployment.outputs.deployment_id }}/statuses" \
            --input - <<<"${payload}" >/dev/null

      - name: Mark deployment failed
        if: steps.github_deployment.outputs.deployment_id != '' && steps.vercel_deploy.outcome != 'success' && steps.vercel_deploy.outcome != ''
        run: |
          payload="$(jq -n \
            --arg log_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{
              state: "failure",
              log_url: $log_url,
              description: "Vercel deployment failed"
            }')"
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/deployments/${{ steps.github_deployment.outputs.deployment_id }}/statuses" \
            --input - <<<"${payload}" >/dev/null

      - name: Fail workflow on deployment error
        if: steps.config.outputs.enabled == 'true' && steps.vercel_deploy.outcome != 'success'
        run: exit 1
