name: Auto Label

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Apply PR path labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}

  label-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Apply issue keyword labels
        uses: actions/github-script@v7
        with:
          script: |
            const title = (context.payload.issue.title || '').toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = `${title} ${body}`;
            const labels = new Set();

            if (/(bug|broken|crash|error|regression|fail)/.test(text)) labels.add('bug');
            if (/(security|vulnerability|cve|injection|xss|csrf|auth)/.test(text)) labels.add('security');
            if (/(performance|slow|latency|memory leak|throughput)/.test(text)) labels.add('performance');
            if (/(browser|playwright|agent-browser|scrape|crawl|web)/.test(text)) labels.add('browser');
            if (/(workflow|scheduler|queue|step|run graph|orchestr)/.test(text)) labels.add('workflow');
            if (/(memory|retrieval|embedding|rag|context)/.test(text)) labels.add('memory');
            if (/(deploy|vercel|cloudflare|docker|container|ci\/cd|workflow file)/.test(text)) labels.add('deployment');
            if (/(docs|documentation|readme|guide|architecture|manifest)/.test(text)) labels.add('docs');

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [...labels],
              });
            }
