name: "Setup Cadet Workspace"
description: "Install the Cadet toolchain and workspace dependencies for CI and agent workflows."

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.10"

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Bun install cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Cache Rust artifacts
      uses: Swatinem/rust-cache@v2

    - name: Install SpacetimeDB CLI
      shell: bash
      run: |
        curl -sSf https://install.spacetimedb.com | sh -s -- -y
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$HOME/.local/share/spacetime/bin/current" >> "$GITHUB_PATH"

    - name: Install workspace dependencies
      shell: bash
      run: bun install --frozen-lockfile
