name: Bug Report
description: Report a bug in Cadet
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: validation_commands
    attributes:
      label: Validation commands
      description: Include exact commands if the issue is reproducible from the CLI.
      render: shell
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
    validations:
      required: false
